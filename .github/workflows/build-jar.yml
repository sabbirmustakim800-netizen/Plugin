name: Unzip and Build TrafficConnect (Gradle Only)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-gradle:
    runs-on: ubuntu-latest

    steps:
    # ১. আপনার গিটহাব রিপোজিটরি থেকে TrafficConnect.zip ফাইলটি নেওয়া
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. জিপ ফইলটি 'project_files' ফোল্ডারে আনজিপ করা
    - name: Unzip TrafficConnect.zip
      run: |
        unzip TrafficConnect.zip -d project_files/
        cd project_files/
        ls -la # জিপের ভেতরের ফাইলগুলো ঠিকঠাক আছে কিনা তা লগে দেখার জন্য

    # ৩. জাভা ২১ সেটআপ করা (Minecraft 1.21+ প্লাগইনের জন্য এটি প্রয়োজন)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # ৪. গ্রেডল র‍্যাপার (gradlew) থাকলে সেটিকে রান করার পারমিশন দেওয়া
    - name: Grant execute permission for gradlew
      run: |
        cd project_files/
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    # ৫. গ্রেডল দিয়ে .jar ফাইল বিল্ড/কম্পাইল করা
    - name: Build JAR with Gradle
      run: |
        cd project_files/
        if [ -f "gradlew" ]; then
          ./gradlew build
        else
          gradle build
        fi

    # ৬. তৈরি হওয়া ফাইনাল .jar ফাইলটি ডাউনলোড করার জন্য Artifact হিসেবে আপলোড করা
    - name: Upload TrafficConnect JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrafficConnect-Gradle-JAR
        path: project_files/build/libs/*.jar
