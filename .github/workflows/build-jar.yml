name: Manually Compile and Build TrafficConnect JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-manual:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব রিপোজিটরি থেকে ফাইল চেকআউট করা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. জিপ ফাইলটি আনজিপ করা
    - name: Unzip TrafficConnect.zip
      run: |
        unzip TrafficConnect.zip -d project_files/
        cd project_files/
        ls -la
        if [ -d "libs" ]; then ls -la libs/; fi

    # ৩. জাভা ২১ সেটআপ করা
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ৪. libs/ ফোল্ডারের ভেতরের সব জার ফাইলকে একসাথে ক্লাসপাথে যুক্ত করে কম্পাইল করা
    # এখানে 'project_files/libs/*' ব্যবহার করায় ফোল্ডারের সব JAR ফাইল অটোমেটিক লোড হবে
    - name: Compile Java Sources
      run: |
        mkdir -p bin/
        find project_files/src -name "*.java" > sources.txt
        javac -d bin/ -cp "project_files/libs/*" @sources.txt

    # ۵. plugin.yml, config.yml সহ সব রিসোর্স একসাথে করে JAR বানানো
    - name: Create Final JAR File
      run: |
        if [ -f "project_files/plugin.yml" ]; then cp project_files/plugin.yml bin/; fi
        if [ -f "project_files/config.yml" ]; then cp project_files/config.yml bin/; fi
        
        cd bin/
        jar cf ../TrafficConnect.jar .
        cd ..
        ls -la TrafficConnect.jar

    # ৬. ফাইনাল সফল জার ফাইলটি ডাউনলোড করার জন্য রেডি করা
    - name: Upload TrafficConnect JAR
      uses: actions/upload-artifact@v4
      with:
        name: TrafficConnect-Success-JAR
        path: TrafficConnect.jar
