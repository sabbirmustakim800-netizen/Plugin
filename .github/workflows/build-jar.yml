name: Manually Compile and Build TrafficConnect JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-manual:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব রিপোজিটরি থেকে কোড নেওয়া
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. জিপ ফাইলটি আনজিপ করা
    - name: Unzip TrafficConnect.zip
      run: |
        unzip TrafficConnect.zip -d project_files/
        cd project_files/
        ls -la

    # ৩. জাভা ২১ সেটআপ করা
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ৪. প্রোজেক্টের জন্য সব প্রয়োজনীয় JAR লাইব্রেরি ডাউনলোড করা (যা গিটহাব ব্লক করবে না)
    - name: Download All Dependencies (Spigot, Floodgate, Geyser)
      run: |
        mkdir -p lib/
        # Spigot API
        curl -L -o lib/spigot-api.jar "https://repo.maven.apache.org/maven2/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/spigot-api-1.20.4-R0.1-20231208.012543-16.jar"
        # Floodgate API
        curl -L -o lib/floodgate-api.jar "https://repo.opencollab.dev/maven-snapshots/org/geysermc/floodgate/api/2.2.3-SNAPSHOT/api-2.2.3-20240222.091316-14.jar"
        # Geyser Cumulus (Form API)
        curl -L -o lib/cumulus.jar "https://repo.opencollab.dev/maven-snapshots/org/geysermc/cumulus/cumulus/1.1.2-SNAPSHOT/cumulus-1.1.2-20230811.213702-6.jar"

    # ৫. সব লাইব্রেরি একসাথে যুক্ত করে জাভা ফাইলগুলো কম্পাইল করা
    - name: Compile Java Sources
      run: |
        mkdir -p bin/
        find project_files/src -name "*.java" > sources.txt
        
        # সব কটি ডাউনলোড করা জার ক্লাসের পাথে (Classpath) যুক্ত করা হলো
        javac -d bin/ -cp "lib/spigot-api.jar:lib/floodgate-api.jar:lib/cumulus.jar" @sources.txt

    # ৬. plugin.yml, config.yml সহ সব রিসোর্স ফোল্ডার একসাথে করে ফাইনাল JAR তৈরি
    - name: Create Final JAR File
      run: |
        if [ -f "project_files/plugin.yml" ]; then cp project_files/plugin.yml bin/; fi
        if [ -f "project_files/config.yml" ]; then cp project_files/config.yml bin/; fi
        
        cd bin/
        jar cf ../TrafficConnect.jar .
        cd ..
        ls -la TrafficConnect.jar

    # ৭. তৈরি হওয়া সফল জার ফাইলটি ডাউনলোড করার জন্য আপলোড করা
    - name: Upload TrafficConnect JAR
      uses: actions/upload-artifact@v4
      with:
        name: TrafficConnect-Success-JAR
        path: TrafficConnect.jar
