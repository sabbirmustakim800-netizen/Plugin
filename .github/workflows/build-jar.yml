name: Manually Compile and Build TrafficConnect JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-manual:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব রিপোজিটরি থেকে ফাইল চেকআউট করা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. জিপ ফাইলটি আনজিপ করা
    - name: Unzip TrafficConnect.zip
      run: |
        unzip TrafficConnect.zip -d project_files/
        cd project_files/
        ls -la

    # ৩. জাভা ২১ সেটআপ করা
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ৪. গিটহাবের নিরাপদ মাভেন সেন্ট্রাল থেকে Spigot API ডাউনলোড করা (এটি কখনো ব্লক হবে না)
    - name: Download Spigot API Dependency
      run: |
        mkdir -p lib/
        curl -L -o lib/spigot-api.jar "https://repo.maven.apache.org/maven2/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/spigot-api-1.20.4-R0.1-20231208.012543-16.jar"

    # ৫. জাভা ফাইলগুলো সঠিকভাবে কম্পাইল করা
    - name: Compile Java Sources
      run: |
        mkdir -p bin/
        find project_files/src -name "*.java" > sources.txt
        javac -d bin/ -cp lib/spigot-api.jar @sources.txt

    # ৬. plugin.yml, config.yml সহ সব রিসোর্স একসাথে করে JAR বানানো
    - name: Create Final JAR File
      run: |
        if [ -f "project_files/plugin.yml" ]; then cp project_files/plugin.yml bin/; fi
        if [ -f "project_files/config.yml" ]; then cp project_files/config.yml bin/; fi
        
        cd bin/
        jar cf ../TrafficConnect.jar .
        cd ..

    # ৭. ফাইনাল সফল জার ফাইলটি ডাউনলোড করার জন্য রেডি করা
    - name: Upload TrafficConnect JAR
      uses: actions/upload-artifact@v4
      with:
        name: TrafficConnect-Success-JAR
        path: TrafficConnect.jar
