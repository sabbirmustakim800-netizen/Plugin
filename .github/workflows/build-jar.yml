name: Manually Compile and Build TrafficConnect JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-manual:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব রিপোজিটরি থেকে TrafficConnect.zip নেওয়া
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. জিপ ফাইলটি আনজিপ করা
    - name: Unzip TrafficConnect.zip
      run: |
        unzip TrafficConnect.zip -d project_files/
        cd project_files/
        ls -la

    # ৩. জাভা ২১ সেটআপ করা (Minecraft 1.21+ এর জন্য)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ৪. Spigot/Paper API (ডিপেন্ডেন্সি) ডাউনলোড করা, যা কোড কম্পাইল করতে লাগবে
    - name: Download Spigot API Dependency
      run: |
        mkdir -p lib/
        curl -o lib/spigot-api.jar https://hub.spigotmc.org/nexus/content/repositories/snapshots/org/spigotmc/spigot-api/1.21-R0.1-SNAPSHOT/spigot-api-1.21-R0.1-20240624.225501-18.jar

    # ৫. ম্যানুয়ালি জাভা ফাইলগুলো কম্পাইল করা এবং ক্লাস ফাইল তৈরি করা
    - name: Compile Java Sources
      run: |
        mkdir -p bin/
        # src ফোল্ডারের ভেতরের সব .java ফাইল খুঁজে spigot-api কানেক্ট করে কম্পাইল করা
        find project_files/src -name "*.java" > sources.txt
        javac -d bin/ -cp lib/spigot-api.jar @sources.txt

    # ৬. plugin.yml, config.yml এবং ক্লাস ফাইলগুলো একসাথে করে ফাইনাল JAR বানানো
    - name: Create Final JAR File
      run: |
        # plugin.yml এবং config.yml ফাইলগুলো bin ফোল্ডারে কপি করা (যাতে এগুলো জারের ভেতরে থাকে)
        if [ -f "project_files/plugin.yml" ]; then cp project_files/plugin.yml bin/; fi
        if [ -f "project_files/config.yml" ]; then cp project_files/config.yml bin/; fi
        
        # bin ফোল্ডার থেকে TrafficConnect.jar তৈরি করা
        cd bin/
        jar cf ../TrafficConnect.jar .
        cd ..
        
        # ফাইল তৈরি হয়েছে কিনা চেক করা
        ls -la TrafficConnect.jar

    # ৭. তৈরি হওয়া ফাইনাল .jar ফাইলটি Artifact হিসেবে আপলোড করা
    - name: Upload TrafficConnect JAR
      uses: actions/upload-artifact@v4
      with:
        name: TrafficConnect-Manual-JAR
        path: TrafficConnect.jar
